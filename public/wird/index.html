<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Wird Tidjaniya</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:        #10b981;
      --green-bg:     rgba(6, 78, 59, 0.3);
      --green-border: rgba(16, 185, 129, 0.5);
      --green-flash:  rgba(16, 185, 129, 0.15);
      --green-done:   #065f46;
      --amber:        #f59e0b;
      --red:          #f87171;
      --red-bg:       rgba(127, 29, 29, 0.3);
      --red-border:   rgba(239, 68, 68, 0.5);
      --card:         #18181b;
      --border:       #27272a;
      --border-md:    #3f3f46;
      --text:         #e4e4e7;
      --text-md:      #a1a1aa;
      --text-dim:     #71717a;
    }

    html, body { height: 100%; }

    body {
      background: #000;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Écrans ── */
    .screen { display: none; flex-direction: column; height: 100%; position: relative; }
    .screen.active { display: flex; }

    /* ─────────────────────────────────────────────────────────
       MENU
    ───────────────────────────────────────────────────────── */
    #menu { padding: 2rem; background: #000; }

    .menu-header {
      margin-top: 4rem;
      margin-bottom: 2.5rem;
      text-align: center;
      position: relative;
    }

    #lang-btn {
      position: absolute;
      top: 0; right: 0;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-md);
      border: 1px solid var(--border-md);
      border-radius: 999px;
      padding: 0.375rem 0.875rem;
      background: transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #lang-btn:active { color: var(--green); border-color: var(--green); }

    #app-title {
      font-size: 2.25rem;
      font-weight: 800;
      color: var(--green);
      letter-spacing: -0.02em;
    }

    #app-sub {
      color: var(--text-dim);
      margin-top: 0.75rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 600;
    }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      max-width: 28rem;
      margin: 0 auto;
      width: 100%;
    }

    #btn-resume {
      background: var(--green-bg);
      border: 1px solid var(--green-border);
      border-radius: 1.5rem;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      display: none;
      margin-bottom: 0.5rem;
      width: 100%;
      transition: background 0.15s;
    }
    #btn-resume.visible { display: block; }
    #btn-resume:active { background: rgba(6, 78, 59, 0.5); }

    #resume-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #34d399;
      display: block;
      margin-bottom: 0.25rem;
    }
    #resume-sub {
      font-size: 0.875rem;
      color: rgba(167, 243, 208, 0.7);
      display: block;
    }

    .btn-wird {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 1.75rem;
      text-align: left;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      width: 100%;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-wird:active { background: #27272a; border-color: rgba(16, 185, 129, 0.3); }

    .wird-name {
      font-size: 1.875rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .wird-name.lazim  { color: #fff; }
    .wird-name.wazifa { color: var(--green); }
    .wird-name.hadra  { color: var(--amber); }
    .wird-sub { font-size: 0.875rem; color: var(--text-md); }

    /* ─────────────────────────────────────────────────────────
       ZIKR
    ───────────────────────────────────────────────────────── */
    #zikr { background: #000; }

    .zikr-header {
      flex-shrink: 0;
      background: var(--card);
      padding: 1.5rem 1.5rem 2rem;
      border-radius: 0 0 1.5rem 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      position: relative;
    }

    #btn-back {
      position: absolute;
      top: 1.5rem; left: 1.5rem;
      width: 2.5rem; height: 2.5rem;
      background: var(--border);
      border: none;
      border-radius: 50%;
      color: var(--text-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #btn-back:active { background: var(--border-md); }

    #step-dots {
      position: absolute;
      top: 1.875rem; right: 1.5rem;
      display: flex;
      gap: 0.375rem;
      align-items: center;
    }

    .dot {
      height: 0.5rem;
      border-radius: 999px;
      transition: all 0.3s;
    }
    .dot.done    { width: 0.5rem;  background: var(--green-done); }
    .dot.current { width: 1.25rem; background: var(--green); }
    .dot.future  { width: 0.5rem;  background: var(--border-md); }

    .step-info {
      margin-top: 3rem;
      text-align: center;
      padding: 0 1rem;
    }

    #step-title {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    #wudu-badge {
      display: none;
      align-items: center;
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      color: var(--red);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.375rem 0.75rem;
      border-radius: 999px;
      margin: 0 auto 1rem;
      font-weight: 700;
      width: fit-content;
      animation: pulse 2s infinite;
    }
    #wudu-badge.visible { display: inline-flex; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    #step-arabic {
      font-size: 2.25rem;
      line-height: 1.7;
      margin-bottom: 1rem;
      color: #f4f4f5;
      direction: rtl;
      font-family: 'Amiri', 'Noto Naskh Arabic', 'Arabic UI Text', 'Geeza Pro', Georgia, serif;
    }

    #step-phonetic {
      font-size: 0.875rem;
      color: var(--text-md);
      font-style: italic;
      margin-bottom: 0.5rem;
      line-height: 1.6;
    }

    #step-translation {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1.5;
    }

    /* ── Zone de tap ── */
    #tap-zone {
      flex: 1;
      width: 100%;
      background: #000;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      outline: none;
      transition: background 0.2s ease-out;
    }
    #tap-zone.flash { background: var(--green-flash); }

    #counter {
      font-size: clamp(6rem, 28vw, 11rem);
      font-weight: 900;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.04em;
      transition: color 0.2s, font-size 0.2s;
      pointer-events: none;
    }
    #counter.done { color: var(--green); font-size: 6rem; }

    #done-back {
      display: none;
      margin-top: 2rem;
      font-size: 0.875rem;
      color: var(--text-md);
      border: 1px solid var(--border-md);
      border-radius: 999px;
      padding: 0.625rem 1.5rem;
      background: transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    #done-back:active { color: var(--green); border-color: var(--green); }

    #progress-track {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 4px;
      background: var(--card);
      pointer-events: none;
    }
    #progress-bar {
      height: 100%;
      background: var(--green);
      width: 0%;
      transition: width 0.3s ease-out;
    }

    /* ── Bouton undo ── */
    #btn-undo {
      position: absolute;
      bottom: 2.5rem; right: 1.5rem;
      width: 3.5rem; height: 3.5rem;
      background: rgba(39, 39, 42, 0.85);
      border: 1px solid var(--border-md);
      color: var(--text);
      border-radius: 50%;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      z-index: 20;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }
    #btn-undo:active { background: var(--border-md); transform: scale(0.88); }
    #btn-undo.hidden { display: none; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════
     ÉCRAN MENU
════════════════════════════════════ -->
<div id="menu" class="screen active">
  <div class="menu-header">
    <button id="lang-btn" onclick="toggleLang()">عربي</button>
    <h1 id="app-title">Tariqa Tidjaniya</h1>
    <p id="app-sub">Outil de Pratique</p>
  </div>

  <div class="menu-buttons">
    <button id="btn-resume" onclick="resumeWird()">
      <span id="resume-title">Continuer la session</span>
      <span id="resume-sub"></span>
    </button>

    <button class="btn-wird" onclick="startWird('lazim')">
      <span class="wird-name lazim"  id="lazim-name">Le Lâzim</span>
      <span class="wird-sub"         id="lazim-sub">Matin &amp; Soir · Individuel</span>
    </button>

    <button class="btn-wird" onclick="startWird('wazifa')">
      <span class="wird-name wazifa" id="wazifa-name">La Wazifa</span>
      <span class="wird-sub"         id="wazifa-sub">1x par jour · Communautaire</span>
    </button>

    <button class="btn-wird" onclick="startWird('hadra')">
      <span class="wird-name hadra"  id="hadra-name">Hadratul-Jum&#x2019;a</span>
      <span class="wird-sub"         id="hadra-sub">Vendredi après-midi (Asr)</span>
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════
     ÉCRAN ZIKR
════════════════════════════════════ -->
<div id="zikr" class="screen">

  <div class="zikr-header">
    <button id="btn-back" onclick="returnToMenu()" aria-label="Retour">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
    </button>

    <div id="step-dots"></div>

    <div class="step-info">
      <h2 id="step-title">Titre</h2>
      <div id="wudu-badge">&#x26A0;&#xFE0F; Ablution requise</div>
      <p id="step-arabic">النص العربي</p>
      <p id="step-phonetic">Phonétique</p>
      <p id="step-translation">Traduction</p>
    </div>
  </div>

  <div id="tap-zone" onclick="handleTap()">
    <div id="counter">0</div>
    <button id="done-back" onclick="event.stopPropagation(); returnToMenu()">
      Retour au menu
    </button>
    <div id="progress-track">
      <div id="progress-bar"></div>
    </div>
  </div>

  <button id="btn-undo" onclick="handleUndo(event)">-1</button>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
//  DONNÉES
// ═══════════════════════════════════════════════════════════════

const SUBHANA = {
  titleFr: 'Tasbîh (Verset de clôture)',
  titleAr:  'التسبيح',
  arabic:   'سُبْحَانَ رَبِّكَ رَبِّ الْعِزَّةِ عَمَّا يَصِفُونَ وَسَلَامٌ عَلَى الْمُرْسَلِينَ وَالْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ',
  phonetic: 'Subhâna rabbika rabbil-ʻizzati ʻammâ yaçifûna, wa salâmun ʻalal-mursalîna, wal-hamdu lillâhi rabbil-ʻâlamîn.',
  transla:  'Gloire à ton Seigneur, le Seigneur de la majesté. Paix sur les Envoyés. Louange à Allah, Seigneur des Mondes.',
  count: 1
};

const SAYYIDUNA = {
  titleFr: 'Salâm sur le Prophète',
  titleAr:  'الصلاة والسلام',
  arabic:   'سَيِّدُنَا مُحَمَّدٌ رَسُولُ اللَّهِ عَلَيْهِ سَلَامُ اللَّهِ',
  phonetic: 'Sayyidunâ Muhammadun Rasûlullâh, ʻalayhi salâmullâh.',
  transla:  "Notre Seigneur Muhammad est le Messager d'Allah, sur lui soit la paix d'Allah.",
  count: 1
};

const AWRAD = {
  lazim: [
    {
      titleFr: "1. Isti'âdha (Protection)",
      titleAr:  '١. الاستعاذة',
      arabic:   'أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ',
      phonetic: "A'ûzu bil-lâhi minach-chaytânir-rajîm.",
      transla:  "Je me réfugie auprès d'Allah contre Satan le maudit.",
      count: 1
    },
    {
      titleFr: '2. Al-Fâtiha (Ouverture)',
      titleAr:  '٢. الفاتحة',
      arabic:   'بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ ۝ الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ...',
      phonetic: 'Bismil-lâhir-rahmânir-rahîm. Al-hamdu lillâhi rabbil-ʻâlamîn...',
      transla:  "Au nom d'Allah, le Tout Miséricordieux. Louange à Allah, Seigneur des Mondes...",
      count: 1
    },
    {
      titleFr: '3. Istighfâr (Pardon)',
      titleAr:  '٣. الاستغفار',
      arabic:   'أَسْتَغْفِرُ اللَّهَ',
      phonetic: 'Astaghfirul-lâh.',
      transla:  'Je demande pardon à Allah.',
      count: 100
    },
    {
      titleFr: '4. Salâtul Fâtihi',
      titleAr:  '٤. صلاة الفاتح',
      arabic:   'اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ الْفَاتِحِ لِمَا أُغْلِقَ وَالْخَاتِمِ لِمَا سَبَقَ نَاصِرِ الْحَقِّ بِالْحَقِّ وَالْهَادِي إِلَى صِرَاطِكَ الْمُسْتَقِيمِ وَعَلَى آلِهِ حَقَّ قَدْرِهِ وَمِقْدَارِهِ الْعَظِيمِ',
      phonetic: "Allâhumma çalli ʻalâ sayyidinâ Muhammadinil-fâtihi limâ ughliq, wal-khâtimi limâ sabaq, nâçiril-haqqi bil-haqqi, wal-hâdî ilâ çirâtikal-mustaqîm, wa ʻalâ âlihî haqqaqdarihi wa miqdârihil-ʻazîm.",
      transla:  "Ô Allah ! Prie sur notre Seigneur Muhammad, l'Ouvreur de ce qui était fermé, le Sceau de ce qui a précédé, le Défenseur du vrai par le vrai, le Guide vers Ta voie droite.",
      count: 100
    },
    Object.assign({}, SUBHANA,   { titleFr: '5. ' + SUBHANA.titleFr,   titleAr: '٥. ' + SUBHANA.titleAr }),
    {
      titleFr: '6. At-Tawhîd (Unitude)',
      titleAr:  '٦. التوحيد',
      arabic:   'لَا إِلَهَ إِلَّا اللَّهُ',
      phonetic: 'Lâ ilâha illal-lâh.',
      transla:  "Il n'y a pas de divinité sauf Allah.",
      count: 100
    },
    Object.assign({}, SAYYIDUNA, { titleFr: '7. ' + SAYYIDUNA.titleFr, titleAr: '٧. ' + SAYYIDUNA.titleAr }),
    {
      titleFr: '8. Clôture (S. 33 V. 56)',
      titleAr:  '٨. الخاتمة',
      arabic:   'إِنَّ اللَّهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ ۚ يَا أَيُّهَا الَّذِينَ آمَنُوا صَلُّوا عَلَيْهِ وَسَلِّمُوا تَسْلِيمًا',
      phonetic: "Innal-lâha wa malâ-ikatahû yuçallûna ʻalan-nabî. Yâ ayyuhal-lazîna âmanû çallû ʻalayhi wa sallimû taslîmâ.",
      transla:  "Certes Allah et Ses Anges prient sur le Prophète. Ô vous qui avez cru, priez sur lui et adressez-lui la paix.",
      count: 1
    }
  ],

  wazifa: [
    {
      titleFr: '1. Introduction',
      titleAr:  '١. المقدمة',
      arabic:   'أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ ۝ بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ...',
      phonetic: "Isti'âdha (Ta'awwuz) puis Al-Fâtiha.",
      transla:  'Protection contre Satan, puis récitation de la Fatiha.',
      count: 1
    },
    {
      titleFr: '2. Istighfâr (Grand Pardon)',
      titleAr:  '٢. الاستغفار الكبير',
      arabic:   'أَسْتَغْفِرُ اللَّهَ الْعَظِيمَ الَّذِي لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ وَأَتُوبُ إِلَيْهِ',
      phonetic: "Astaghfirullâhal-ʻazîmal-lazî lâ ilâha illâ huwal-hayyul-qayyûm, wa atûbu ilayh.",
      transla:  "Je demande pardon à Dieu l'Immense, Il n'y a de divinité que Lui, le Vivant, l'Immuable. Et je me repens vers Lui.",
      count: 30
    },
    {
      titleFr: '3. Salâtul Fâtihi',
      titleAr:  '٣. صلاة الفاتح',
      arabic:   'اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ الْفَاتِحِ لِمَا أُغْلِقَ وَالْخَاتِمِ لِمَا سَبَقَ...',
      phonetic: 'Allâhumma çalli ʻalâ sayyidinâ Muhammadinil-fâtihi limâ ughliq...',
      transla:  "Ô Allah ! Prie sur notre Seigneur Muhammad, l'Ouvreur de ce qui était fermé...",
      count: 50
    },
    Object.assign({}, SUBHANA,   { titleFr: '4. ' + SUBHANA.titleFr,   titleAr: '٤. ' + SUBHANA.titleAr }),
    {
      titleFr: '5. At-Tawhîd (Unitude)',
      titleAr:  '٥. التوحيد',
      arabic:   'لَا إِلَهَ إِلَّا اللَّهُ',
      phonetic: 'Lâ ilâha illal-lâh.',
      transla:  "Il n'y a pas de divinité sauf Allah.",
      count: 100
    },
    {
      titleFr: '6. Djawharatul Kamâl',
      titleAr:  '٦. جوهرة الكمال',
      arabic:   'اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى عَيْنِ الرَّحْمَةِ الرَّبَّانِيَّةِ وَالْيَاقُوتَةِ الْمُتَحَقِّقَةِ الْحَائِطَةِ بِمَرْكَزِ الْفُهُومِ وَالْمَعَانِي...',
      phonetic: "Allâhumma çalli wa sallim ʻalâ ʻaynir-rahmatar-rabbâniyya, wal-yâqûtatil-mutahaqqiqatil-hâitati bi-markazi...",
      transla:  "Ô Allah ! Prie et accorde la paix sur l'Essence de la miséricorde divine...",
      count: 12,
      requiresWudu: true
    },
    {
      titleFr: '7. Clôture (S. 33 V. 56)',
      titleAr:  '٧. الخاتمة',
      arabic:   'إِنَّ اللَّهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ...',
      phonetic: "Innal-lâha wa malâ-ikatahû yuçallûna ʻalan-nabî...",
      transla:  "Certes Allah et Ses Anges prient sur le Prophète...",
      count: 1
    }
  ],

  hadra: [
    {

// ═══════════════════════════════════════════════════════════════
//  TRADUCTIONS
// ═══════════════════════════════════════════════════════════════

const T = {
  fr: {
    appTitle:    'Tariqa Tidjaniya',
    appSub:      'Outil de Pratique',
    resumeTitle: 'Continuer la session',
    names:       { lazim: 'Le Lâzim', wazifa: 'La Wazifa', hadra: "Hadratul-Jum’a" },
    subs:        { lazim: 'Matin & Soir · Individuel', wazifa: '1x par jour · Communautaire', hadra: 'Vendredi après-midi (Asr)' },
    wudu:        '⚠ Ablution requise',
    doneTitle:   'Zikr Terminé',
    doneAccept:  "Qu’Allah accepte nos œuvres.",
    stepOf:      (s, t) => `Étape ${s} / ${t}`,
    remaining:   n => `${n} restants`,
    backMenu:    'Retour au menu',
    langToggle:  'عربي',
  },
  ar: {
    appTitle:    'الطريقة التجانية',
    appSub:      'أداة الممارسة',
    resumeTitle: 'استئناف الجلسة',
    names:       { lazim: 'اللازم', wazifa: 'الوظيفة', hadra: 'حضرة الجمعة' },
    subs:        { lazim: 'صباحاً ومساءً · فردي', wazifa: 'مرة يومياً · جماعي', hadra: 'الجمعة بعد العصر' },
    wudu:        '⚠ الوضوء واجب',
    doneTitle:   'اكتمل الذكر',
    doneAccept:  'تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ',
    stepOf:      (s, t) => `خطوة ${s} / ${t}`,
    remaining:   n => `${n} متبقية`,
    backMenu:    'العودة إلى القائمة',
    langToggle:  'Français',
  }
};

// ═══════════════════════════════════════════════════════════════
//  ÉTAT
// ═══════════════════════════════════════════════════════════════

let lang         = 'fr';
let wirdType     = null;
let steps        = [];
let stepIndex    = 0;
let remaining    = 0;
let target       = 0;
let isCompleted  = false;
let wakeLock     = null;
let audioCtx     = null;
let savedSession = null;

// ═══════════════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════════════

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
  if (!audioCtx) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  const t = audioCtx.currentTime;
  if (type === 'step') {
    osc.frequency.setValueAtTime(523.25, t);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.3, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1);
    osc.start(t); osc.stop(t + 1);
  } else if (type === 'milestone') {
    osc.frequency.setValueAtTime(783.99, t);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.1, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.start(t); osc.stop(t + 0.3);
  } else if (type === 'end') {
    osc.frequency.setValueAtTime(523.25, t);
    osc.frequency.setValueAtTime(659.25, t + 0.3);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.3, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.1, t + 0.25);
    gain.gain.linearRampToValueAtTime(0.3, t + 0.35);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
    osc.start(t); osc.stop(t + 1.5);
  }
}

// ═══════════════════════════════════════════════════════════════
//  HAPTIQUES + WAKE LOCK
// ═══════════════════════════════════════════════════════════════

function vib(p) { if (navigator.vibrate) navigator.vibrate(p); }

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {}
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// ═══════════════════════════════════════════════════════════════
//  STOCKAGE
// ═══════════════════════════════════════════════════════════════

function persistState() {
  try {
    if (remaining > 0 && wirdType)
      localStorage.setItem('wird_state', JSON.stringify({ type: wirdType, step: stepIndex, count: remaining }));
  } catch(e) {}
}

function clearPersistedState() {
  try { localStorage.removeItem('wird_state'); } catch(e) {}
}

function loadPersistedState() {
  try {
    const l = localStorage.getItem('wird_lang');
    if (l === 'fr' || l === 'ar') lang = l;
    return JSON.parse(localStorage.getItem('wird_state') || 'null');
  } catch(e) { return null; }
}

// ═══════════════════════════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════════════════════════

const $ = id => document.getElementById(id);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

// ─── Langue ───────────────────────────────────────────────────

function applyLang() {
  const tr  = T[lang];
  const isAr = lang === 'ar';
  document.documentElement.lang = lang;
  $('menu').setAttribute('dir', isAr ? 'rtl' : 'ltr');

  $('lang-btn').textContent   = tr.langToggle;
  $('app-title').textContent  = tr.appTitle;
  $('app-sub').textContent    = tr.appSub;
  $('resume-title').textContent = tr.resumeTitle;
  $('lazim-name').textContent  = tr.names.lazim;
  $('lazim-sub').textContent   = tr.subs.lazim;
  $('wazifa-name').textContent = tr.names.wazifa;
  $('wazifa-sub').textContent  = tr.subs.wazifa;
  $('hadra-name').textContent  = tr.names.hadra;
  $('hadra-sub').textContent   = tr.subs.hadra;
  $('done-back').textContent   = tr.backMenu;
  $('wudu-badge').textContent  = tr.wudu;

  if (wirdType) {
    const step = steps[stepIndex];
    $('step-title').textContent = isAr ? step.titleAr : step.titleFr;
  }

  updateResumeBtn();
}

function toggleLang() {
  lang = lang === 'fr' ? 'ar' : 'fr';
  try { localStorage.setItem('wird_lang', lang); } catch(e) {}
  applyLang();
}

// ─── Bouton reprise ───────────────────────────────────────────

function updateResumeBtn() {
  const btn = $('btn-resume');
  if (savedSession) {
    const tr = T[lang];
    const tot = AWRAD[savedSession.type].length;
    $('resume-sub').textContent =
      tr.names[savedSession.type] + ' — ' +
      tr.stepOf(savedSession.step + 1, tot) + ' — ' +
      tr.remaining(savedSession.count);
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
}

// ─── Zikr ─────────────────────────────────────────────────────

function renderDots() {
  const c = $('step-dots');
  c.innerHTML = '';
  c.style.display = 'flex';
  steps.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot ' + (i === stepIndex ? 'current' : i < stepIndex ? 'done' : 'future');
    c.appendChild(d);
  });
}

function renderStep() {
  const tr   = T[lang];
  const step = steps[stepIndex];

  $('step-title').textContent    = lang === 'ar' ? step.titleAr : step.titleFr;
  $('step-arabic').textContent   = step.arabic;
  $('step-phonetic').textContent = step.phonetic;
  $('step-translation').textContent = step.transla;
  $('wudu-badge').textContent    = tr.wudu;

  if (step.requiresWudu) $('wudu-badge').classList.add('visible');
  else                   $('wudu-badge').classList.remove('visible');

  $('counter').textContent = remaining;
  $('counter').classList.remove('done');
  $('progress-bar').style.width = target > 0 ? ((target - remaining) / target * 100) + '%' : '0%';
  $('done-back').style.display = 'none';
  $('btn-undo').classList.remove('hidden');
  renderDots();
}

function updateProgress() {
  $('counter').textContent = remaining;
  $('progress-bar').style.width = target > 0 ? ((target - remaining) / target * 100) + '%' : '0%';
}

function showCompleted() {
  const tr = T[lang];
  $('step-title').textContent       = tr.doneTitle;
  $('step-arabic').textContent      = 'تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ';
  $('step-phonetic').textContent    = 'Taqabbal Allâhu minnâ wa minkum';
  $('step-translation').textContent = tr.doneAccept;
  $('wudu-badge').classList.remove('visible');
  $('step-dots').style.display = 'none';

  $('counter').textContent = '✓';
  $('counter').classList.add('done');
  $('progress-bar').style.width = '100%';
  $('done-back').textContent = tr.backMenu;
  $('done-back').style.display = 'block';
  $('btn-undo').classList.add('hidden');
}

// ═══════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════

function startWird(type, step, count) {
  step  = step  !== undefined ? step  : 0;
  count = count !== undefined ? count : null;

  initAudio();
  wirdType     = type;
  steps        = AWRAD[type];
  stepIndex    = step;
  target       = steps[step].count;
  remaining    = count !== null ? count : target;
  isCompleted  = false;

  showScreen('zikr');
  renderStep();
  persistState();
  requestWakeLock();
}

function resumeWird() {
  if (savedSession) startWird(savedSession.type, savedSession.step, savedSession.count);
}

function returnToMenu() {
  if (!isCompleted && remaining > 0 && wirdType) {
    persistState();
    savedSession = { type: wirdType, step: stepIndex, count: remaining };
  }
  showScreen('menu');
  applyLang(); // refreshes resume button
  releaseWakeLock();
}

// ═══════════════════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════════════════

function handleTap() {
  if (isCompleted) return;
  initAudio();

  const zone = $('tap-zone');
  zone.classList.add('flash');
  setTimeout(() => zone.classList.remove('flash'), 200);

  if (remaining > 1) {
    remaining--;
    if (target >= 100 && remaining % 100 === 0 && remaining > 0) {
      playSound('milestone');
      vib([30, 50, 30]);
    } else {
      vib(15);
    }
    updateProgress();
    persistState();
  } else {
    if (stepIndex < steps.length - 1) {
      stepIndex++;
      target    = steps[stepIndex].count;
      remaining = target;
      vib([100, 50, 100]);
      playSound('step');
      renderStep();
      persistState();
    } else {
      isCompleted  = true;
      savedSession = null;
      vib([200, 100, 200, 100, 400]);
      playSound('end');
      clearPersistedState();
      releaseWakeLock();
      showCompleted();
    }
  }
}

function handleUndo(e) {
  e.stopPropagation();
  if (isCompleted || remaining >= target) return;
  initAudio();
  remaining++;
  vib(20);
  updateProgress();
  persistState();
}

// ═══════════════════════════════════════════════════════════════
//  INITIALISATION
// ═══════════════════════════════════════════════════════════════

(function init() {
  savedSession = loadPersistedState();
  applyLang();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
})();
</script>
